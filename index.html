<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1 .0">
    <title>Smart Finance</title>

    <style>
        * {
           box-sizing: border-box;
           font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #16803c;
            color: white;
            padding: 22px;
            text-align: center;
        }

        .saldo {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px #ccc;
        }

        .saldo h2 {
            margin: 0;
            color: 16803;
        }

        .form {
            background: white;
            padding: 18px;
            border-radius: 0 2px 8px #ccc;
        }

        input, select, button {
            width: 100%;
            padding: 13px;
            margin-top: 10px
            border-radius: 8px
            border: 1px solid #acc;
        }

        button {
            background: #16803c;
            color: white;
            font-weight: bold;
            border: none;
        }
