<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1 .0">
    <title>Smart Finance</title>

    <style>
        * {
           box-sizing: border-box;
           font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #16803c;
            color: white;
            padding: 22px;
            text-align: center;
        }

        .container {
            padding: 16px;
            max-width: 600px;
            margin: auto;
        }

        .saldo {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px #ccc;
        }

        .saldo h2 {
            margin: 0;
            color: 16803c;
        }

        .form {
            background: white;
            padding: 18px;
            box-shadow: 0 2px 8px #ccc;
        }

        input, select, button {
            width: 100%;
            padding: 13px;
            margin-top: 10px
            border-radius: 8px
            border: 1px solid #ccc;
        }

        button {
            background: #16803c;
            color: white;
            font-weight: bold;
            border: none;
        }

        .transaksi {
            background: white;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
        }

        .masuk {
            color: green;
        }

        .keluar {
            color: red;
        }
    </style>
</head>

<body>

<header>
    <h1>Smart Finance</h1>
    <p>Business Manager</p>
</header>

<div class="container">

    <div class="saldo">
        <p>Saldo Saat Ini</p>
        <h2 id="saldo">Rp 0</h2>
    </div>

    <div class="form">
        <h3>Tambah Transaksi</h3>

        <select id="jenis">
            <option value="masuk">Pemasukan</option>
            <option value="keluar">Penheluaran</option>
        </select>

        <input type="text" id="keterangan" placeholder="Keterangan">

        <input type="number" id="jumlah" placeholder="Jumlah Uang">

        <button onclick="tambahTransaksi()">
            Simpan Transaksi
        </button>
    </div>

    <div class="transaksi>
        <h3>Riwayat Transaksi</h3>
        <div id="riwayat"></div>
    </div>

</div>

<script>
    let transaksi = JSON.parse(localStoreage.getItem("transaksi")) || [];

    function tampilkanTransaksi() {
        let saldo = 0;
        let riwayat = document.getElementById("riwayat");

        riwayat.innerHTML = "";

        transaksi.forEach((item) => {

            if (item.jenis === "masuk") {
                saldo += item.jumlah;
            } else {
                saldo -= item.jumlah;
            }

            let div = document.crateElement("div");

            div.innerHTML = `
                <p>
                    <b>${item.keterangan}</b><br>
                <span class="${item.jenis}">
                    ${item.jenis === "masuk" ? "+" : "-"}
                    Rp ${item.jumlah.toLocaleString("id-ID")}
                </span>
            </p>
            <hr>
        `;

        riwayat.appendChild(div);
    });

    document.getElementById("saldo").innerText =
        "Rp " + saldo.toLocaleString("id-ID");
    }

    function tambahTransaksi() {

        let jenis = document.getElementById("jenis").value;
        let keterangan = document.getElementById("keterangan").value;
        let jumlah = Number(document.getElementById("jumlah").value;

        if (keterangan === "" || jumlah <= 0) {
            alert("isi keterangan dan jumlah uang!");
            return;
        }

        transaksi.push({
            jenis: jenis,
            keterangan: keterangan,
            jumlah: jumlah
        });

        localStorage.setItem(
            "transaksi",
            JSON.stringify(transaksi)
        );

        document.getElementById("keterangan").value = "";
        document.getElementById("jumlah").value = "",

        tampilkanTransaksi();
    }

    tampilkanTransaksi();
</script>

</body>
</html>
